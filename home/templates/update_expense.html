{% extends "base.html" %} {% block start %}
<link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
  rel="stylesheet"
/>

<div class="container col-md-4 mt-5">
  <div class="card shadow p-4">
    <h5>Update Expense</h5>
    <form method="post">
      {% csrf_token %}
      <input
        type="text"
        name="name"
        value="{{ expense.name }}"
        class="form-control mt-2"
        required
      />
      <input
        type="number"
        name="price"
        value="{{ expense.price }}"
        class="form-control mt-2"
        required
      />
      <button class="btn btn-warning mt-3 w-100">Update</button>
    </form>
  </div>
</div>
{% endblock %}
